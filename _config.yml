title: Notes
description: Quick-reference guides for HPC workflows and cluster computing
remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Just the Docs settings
search_enabled: true
search_tokenizer_separator: /[\s/]+/

color_scheme: nil   # set to "dark" to default to dark mode

# Footer
footer_content: "Contributions welcome — open a PR on <a href=\"https://github.com/rccUser001/notes\">GitHub</a>."

# Code copy button
enable_copy_code_button: true

# Callouts
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
